[pytest]
addopts = --alluredir=allure-results
testpaths = tests generated_tests
markers = 
        sanity: sanity UI test suite
        smoke: critical path tests
        regression: broader UI coverage
        component_auth: authentication-related scenarios
        component_inventory: inventory page scenarios
        component_cart: cart-related scenarios
        component_sort: product sort/filter scenarios
        component_navigation: navigation/menu scenarios
        risk_p0: highest risk scenario
        risk_p1: medium-high risk scenario
        risk_p2: lower risk scenario
        speed_fast: fast-running test
        speed_medium: medium-running test
        speed_slow: slow-running test
        type_positive: positive-path scenario
        type_negative: negative-path scenario
        type_edge: edge-case scenario
        source_manual: manually authored tests
        source_generated: generated tests