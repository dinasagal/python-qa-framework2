name: UI Tests + Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright allure-pytest
          playwright install --with-deps

      # 4. Run tests (headless automatically via CI=true)
      - name: Run UI tests
        run: pytest -m "sanity or smoke or regression"

      # 5. Install Allure CLI
      - name: Install Allure
        if: always()
        run: |
          npm install -g allure-commandline --save-dev

      # 6. Generate Allure report
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      # 7. Upload report as artifact
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report