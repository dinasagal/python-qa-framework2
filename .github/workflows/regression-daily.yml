name: Daily Regression Tests + Allure Report

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regression-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps

      # 4. Prepare QA environment variables
      - name: Prepare QA environment
        env:
          QA_BASE_URL: ${{ vars.QA_BASE_URL }}
          QA_STANDARD_USERNAME: ${{ vars.QA_STANDARD_USERNAME }}
          QA_STANDARD_PASSWORD: ${{ secrets.QA_STANDARD_PASSWORD }}
          QA_LOCKED_USERNAME: ${{ vars.QA_LOCKED_USERNAME }}
          QA_LOCKED_PASSWORD: ${{ secrets.QA_LOCKED_PASSWORD }}
        run: |
          cat <<EOF > .env
          QA_BASE_URL=${QA_BASE_URL:-https://www.saucedemo.com/}
          QA_STANDARD_USERNAME=${QA_STANDARD_USERNAME:-standard_user}
          QA_STANDARD_PASSWORD=${QA_STANDARD_PASSWORD:-secret_sauce}
          QA_LOCKED_USERNAME=${QA_LOCKED_USERNAME:-locked_out_user}
          QA_LOCKED_PASSWORD=${QA_LOCKED_PASSWORD:-secret_sauce}
          EOF

      # 5. Run regression tests (headless automatically via CI=true)
      - name: Run Regression Tests
        run: python -m pytest -m "regression"

      # 6. Install Allure CLI
      - name: Install Allure
        if: always()
        run: |
          npm install -g allure-commandline --save-dev

      # 7. Generate Allure report
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      # 8. Upload report as artifact
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-regression-daily
          path: allure-report

      # 9. Deploy Allure Report to GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          keep_files: true
